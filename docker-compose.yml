services:
  tend:
    image: ghcr.io/iamschulz/tend:latest
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - NUXT_PUBLIC_BACKEND_MODE=server
      - NUXT_SESSION_PASSWORD=${NUXT_SESSION_PASSWORD}
      - NUXT_ADMIN_USERNAME=${NUXT_ADMIN_USERNAME}
      - NUXT_ADMIN_PASSWORD=${NUXT_ADMIN_PASSWORD}
      - NUXT_MAX_BODY_SIZE_MB=${NUXT_MAX_BODY_SIZE_MB:-5}
      - NUXT_SESSION_MAX_AGE_DAYS=${NUXT_SESSION_MAX_AGE_DAYS:-60}
      - NUXT_OAUTH_GOOGLE_CLIENT_ID=${NUXT_OAUTH_GOOGLE_CLIENT_ID}
      - NUXT_OAUTH_GOOGLE_CLIENT_SECRET=${NUXT_OAUTH_GOOGLE_CLIENT_ID}
      - NUXT_OAUTH_APPLE_CLIENT_ID=${NUXT_OAUTH_APPLE_CLIENT_ID}
      - NUXT_OAUTH_APPLE_TEAM_ID=${NUXT_OAUTH_APPLE_TEAM_ID}
      - NUXT_OAUTH_APPLE_KEY_ID=${NUXT_OAUTH_APPLE_KEY_ID}
      - NUXT_OAUTH_APPLE_PRIVATE_KEY=${NUXT_OAUTH_APPLE_PRIVATE_KEY}
      - NUXT_OAUTH_GITHUB_CLIENT_ID=${NUXT_OAUTH_GITHUB_CLIENT_ID}
      - NUXT_OAUTH_GITHUB_CLIENT_SECRET=${NUXT_OAUTH_GITHUB_CLIENT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 5s
      retries: 3